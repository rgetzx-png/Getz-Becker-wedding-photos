<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Share Our Wedding Photos</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Poppins,sans-serif;background:linear-gradient(180deg,#faf8fd,#ffffff);color:#333;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:25px;}
.card{width:100%;max-width:500px;background:white;border-radius:28px;padding:40px 30px;text-align:center;box-shadow:0 18px 40px rgba(0,0,0,.12);animation:fadeIn .8s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.topheart{font-size:44px;color:#8a48b7;}h1{font-family:"Great Vibes",cursive;color:#8a48b7;font-size:54px;margin:15px 0 10px;}
.subtitle{font-size:22px;font-weight:600;margin-bottom:20px;}p{color:#666;line-height:1.8;margin-bottom:25px;}
.button{display:inline-block;text-decoration:none;background:#8a48b7;color:white;padding:18px 36px;border-radius:50px;font-size:20px;font-weight:600;transition:.25s;}
.button:hover{background:#6d2f93;transform:scale(1.03);}
.thanks{margin-top:35px;font-family:"Great Vibes",cursive;color:#8a48b7;font-size:34px;}
.footer{margin-top:12px;color:#888;font-size:14px;}
</style></head><body><div class="card"><div class="topheart">💜</div><h1>Share Your Photos</h1><div class="subtitle">Help us capture our day!</div><p>Thank you for celebrating with us! We'd love to relive every smile, laugh, dance, and special memory through your photos and videos.</p><a class="button" href="https://photos.app.goo.gl/Q3Kx9zCNuGFTkh1x6" target="_blank">📷 Upload Wedding Photos</a><div class="thanks">Thank You!</div><div class="footer">We can't wait to see our day through your eyes. 💜</div></div></body></html>
